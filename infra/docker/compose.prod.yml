# Phase 5 prod compose — built images only, no bind mounts.
# Same topology as dev: postgres, postgres-vectors, redis, web.
# Adds: init-vectors (one-shot pgvector extension), migrate (one-shot Prisma).
# Run from repo root: docker compose -f infra/docker/compose.prod.yml up --build -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - columbus_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - columbus-prod

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: columbus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-columbus}
      POSTGRES_DB: columbus
    volumes:
      - columbus_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U columbus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - columbus-prod

  postgres-vectors:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: columbus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-columbus}
      POSTGRES_DB: columbus_vectors
    volumes:
      - columbus_prod_vectors_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U columbus -d columbus_vectors"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - columbus-prod

  init-vectors:
    image: pgvector/pgvector:pg16
    command: >
      sh -c "
        until pg_isready -h postgres-vectors -U columbus -d columbus_vectors; do sleep 1; done;
        psql -h postgres-vectors -U columbus -d columbus_vectors -c 'CREATE EXTENSION IF NOT EXISTS vector;'
      "
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-columbus}
    depends_on:
      postgres-vectors:
        condition: service_healthy
    networks:
      - columbus-prod
    restart: "no"

  migrate:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file:
      - ../../apps/web/.env
    environment:
      DATABASE_URL: postgresql://columbus:${POSTGRES_PASSWORD:-columbus}@postgres:5432/columbus
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - columbus-prod
    restart: "no"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../apps/web/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://columbus:${POSTGRES_PASSWORD:-columbus}@postgres:5432/columbus
      VECTOR_DATABASE_URL: postgresql://columbus:${POSTGRES_PASSWORD:-columbus}@postgres-vectors:5432/columbus_vectors
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - columbus-prod

networks:
  columbus-prod:
    name: columbus-prod

volumes:
  columbus_prod_pgdata:
  columbus_prod_vectors_pgdata:
  columbus_prod_redis_data:
